services:
  db:
    image: postgres:16-alpine
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    image: migrate/migrate
    volumes:
      - ./internal/db/migrations:/migrations
    entrypoint: 
      - migrate
      - -path=/migrations/
      - -database=postgres://postgres:postgres@db:5432/postgres?sslmode=disable
      - up
    depends_on:
      db:
        condition: service_healthy

  app:
    build: .
    container_name: app
    restart: always
    environment:
      DB_URL: "postgres://postgres:postgres@db:5432/postgres"
      REDIS_URL: "redis:6379"
      JWT_KEY: "super-secret-key"
      PORT: "8080"
      ENABLE_LOCK: "true"
      ENABLE_CACHE: "true"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx:/etc/nginx/conf.d:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - app
      - payment-mock

  payment-mock:
    build:
      context: ./payment-mock
    container_name: payment-mock
    restart: unless-stopped
    depends_on:
      - app

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5