services:
  db:
    image: postgres:16-alpine
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Одноразовий контейнер для міграцій
  migrate:
    image: migrate/migrate
    volumes:
      - ./internal/db/migrations:/migrations
    entrypoint: 
      - migrate
      - -path=/migrations/
      - -database=postgres://postgres:postgres@db:5432/postgres?sslmode=disable
      - up
    depends_on:
      db:
        condition: service_healthy

  app:
    build: .
    container_name: go_app
    restart: always
    # environment:
    #   DB_SOURCE: "postgres://postgres:postgres@db:5432/booking_db?sslmode=disable"
      # Додайте інші змінні оточення (JWT_SECRET тощо)
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend:/usr/share/nginx/html:ro # Шлях до папки з index.html
    depends_on:
      - app